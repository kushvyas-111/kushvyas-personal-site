<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 720" preserveAspectRatio="xMaxYMax meet" width="320" height="720">
  <defs>
    <linearGradient id="cr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aecaff"/>
      <stop offset="1" stop-color="#5d86ec"/>
    </linearGradient>
  </defs>
  <g fill="url(#cr)">
    <!-- tallest near the outer (right) edge, stepping down toward the center -->
    <rect x="258" y="150" width="62" height="570"/>
    <rect x="242" y="120" width="14" height="600"/>
    <rect x="206" y="230" width="48" height="490"/>
    <rect x="150" y="190" width="52" height="530"/>
    <rect x="102" y="300" width="44" height="420"/>
    <rect x="48"  y="260" width="50" height="460"/>
    <rect x="0"   y="360" width="44" height="360"/>
  </g>
  <!-- a few lit windows -->
  <g fill="#eaf2ff" opacity="0.6">
    <rect x="298" y="190" width="8" height="10"/>
    <rect x="278" y="190" width="8" height="10"/>
    <rect x="298" y="240" width="8" height="10"/>
    <rect x="278" y="240" width="8" height="10"/>
    <rect x="166" y="230" width="8" height="10"/>
    <rect x="184" y="230" width="8" height="10"/>
    <rect x="72"  y="300" width="8" height="10"/>
  </g>
</svg>
