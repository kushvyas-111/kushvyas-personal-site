<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 240" preserveAspectRatio="xMidYMax slice" width="1440" height="240">
  <defs>
    <linearGradient id="garea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7aa0ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7aa0ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fb0ff" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#8fb0ff" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- dashboard bars -->
  <g fill="url(#gbar)">
    <rect x="80"   y="150" width="30" height="90"  rx="3"/>
    <rect x="124"  y="120" width="30" height="120" rx="3"/>
    <rect x="168"  y="170" width="30" height="70"  rx="3"/>
    <rect x="1242" y="135" width="30" height="105" rx="3"/>
    <rect x="1286" y="110" width="30" height="130" rx="3"/>
    <rect x="1330" y="160" width="30" height="80"  rx="3"/>
  </g>

  <!-- analytics trend line + area -->
  <path d="M0,180 L120,150 L240,165 L360,120 L480,140 L600,95 L720,118 L840,72 L960,92 L1080,65 L1200,85 L1320,53 L1440,72 L1440,240 L0,240 Z"
        fill="url(#garea)"/>
  <polyline points="0,180 120,150 240,165 360,120 480,140 600,95 720,118 840,72 960,92 1080,65 1200,85 1320,53 1440,72"
            fill="none" stroke="#3f72df" stroke-width="3" stroke-opacity="0.7"
            stroke-linejoin="round" stroke-linecap="round"/>
  <g fill="#2f63d6">
    <circle cx="120"  cy="150" r="4"/>
    <circle cx="360"  cy="120" r="4"/>
    <circle cx="600"  cy="95"  r="4"/>
    <circle cx="840"  cy="72"  r="4"/>
    <circle cx="1080" cy="65"  r="4"/>
    <circle cx="1320" cy="53"  r="4"/>
  </g>
</svg>
