<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 460" preserveAspectRatio="xMidYMax slice" width="1440" height="460">
  <defs>
    <linearGradient id="bld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9cbcff"/>
      <stop offset="1" stop-color="#3b6fe0"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6f9bff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6f9bff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7aa0ff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#7aa0ff" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Finance / dashboard bars rising from the baseline -->
  <g fill="url(#bar)">
    <rect x="70"   y="250" width="34" height="210" rx="3"/>
    <rect x="120"  y="210" width="34" height="250" rx="3"/>
    <rect x="170"  y="280" width="34" height="180" rx="3"/>
    <rect x="1240" y="230" width="34" height="230" rx="3"/>
    <rect x="1290" y="190" width="34" height="270" rx="3"/>
    <rect x="1340" y="260" width="34" height="200" rx="3"/>
  </g>

  <!-- Analytics trend: area fill under a rising line -->
  <path d="M0,300 L120,250 L240,272 L360,200 L480,232 L600,158 L720,196 L840,120 L960,152 L1080,108 L1200,142 L1320,88 L1440,120 L1440,460 L0,460 Z"
        fill="url(#area)"/>
  <polyline points="0,300 120,250 240,272 360,200 480,232 600,158 720,196 840,120 960,152 1080,108 1200,142 1320,88 1440,120"
            fill="none" stroke="#2f63d6" stroke-width="3" stroke-opacity="0.75"
            stroke-linejoin="round" stroke-linecap="round"/>
  <!-- data points on the trend line -->
  <g fill="#1d4ed8">
    <circle cx="120"  cy="250" r="4.5"/>
    <circle cx="360"  cy="200" r="4.5"/>
    <circle cx="600"  cy="158" r="4.5"/>
    <circle cx="840"  cy="120" r="4.5"/>
    <circle cx="1080" cy="108" r="4.5"/>
    <circle cx="1320" cy="88"  r="4.5"/>
  </g>

  <!-- Data-point constellation / network nodes -->
  <g stroke="#7aa0ff" stroke-opacity="0.5" stroke-width="1.4">
    <line x1="300" y1="70"  x2="430" y2="120"/>
    <line x1="430" y1="120" x2="540" y2="60"/>
    <line x1="900" y1="80"  x2="1010" y2="130"/>
    <line x1="1010" y1="130" x2="1120" y2="70"/>
  </g>
  <g fill="#93b4ff">
    <circle cx="300"  cy="70"  r="5"/>
    <circle cx="430"  cy="120" r="5"/>
    <circle cx="540"  cy="60"  r="5"/>
    <circle cx="900"  cy="80"  r="5"/>
    <circle cx="1010" cy="130" r="5"/>
    <circle cx="1120" cy="70"  r="5"/>
  </g>

  <!-- Boston skyline silhouette along the bottom -->
  <g fill="url(#bld)">
    <rect x="20"   y="360" width="60"  height="100"/>
    <rect x="90"   y="340" width="48"  height="120"/>
    <rect x="148"  y="372" width="54"  height="88"/>
    <rect x="212"  y="318" width="40"  height="142"/>
    <rect x="262"  y="356" width="58"  height="104"/>
    <!-- Hancock-style slab -->
    <rect x="335"  y="262" width="46"  height="198"/>
    <rect x="392"  y="318" width="50"  height="142"/>
    <rect x="452"  y="356" width="64"  height="104"/>
    <rect x="528"  y="336" width="44"  height="124"/>
    <rect x="582"  y="306" width="38"  height="154"/>
    <!-- Prudential-style tower with antenna -->
    <rect x="632"  y="250" width="58"  height="210"/>
    <rect x="657"  y="222" width="8"   height="28"/>
    <rect x="700"  y="332" width="48"  height="128"/>
    <rect x="758"  y="368" width="60"  height="92"/>
    <rect x="828"  y="318" width="42"  height="142"/>
    <rect x="880"  y="288" width="52"  height="172"/>
    <rect x="942"  y="346" width="46"  height="114"/>
    <rect x="998"  y="300" width="40"  height="160"/>
    <rect x="1048" y="362" width="56"  height="98"/>
    <rect x="1114" y="328" width="44"  height="132"/>
    <rect x="1168" y="370" width="60"  height="90"/>
    <rect x="1238" y="344" width="48"  height="116"/>
    <rect x="1296" y="318" width="40"  height="142"/>
    <rect x="1346" y="366" width="74"  height="94"/>
  </g>
</svg>
