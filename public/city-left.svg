<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 720" preserveAspectRatio="xMinYMax meet" width="320" height="720">
  <defs>
    <linearGradient id="cl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aecaff"/>
      <stop offset="1" stop-color="#5d86ec"/>
    </linearGradient>
  </defs>
  <g fill="url(#cl)">
    <!-- tallest near the outer (left) edge, stepping down toward the center -->
    <rect x="0"   y="150" width="62" height="570"/>
    <rect x="64"  y="120" width="14" height="600"/>
    <rect x="66"  y="230" width="48" height="490"/>
    <rect x="118" y="190" width="52" height="530"/>
    <rect x="174" y="300" width="44" height="420"/>
    <rect x="222" y="260" width="50" height="460"/>
    <rect x="276" y="360" width="44" height="360"/>
  </g>
  <!-- a few lit windows -->
  <g fill="#eaf2ff" opacity="0.6">
    <rect x="14" y="190" width="8" height="10"/>
    <rect x="34" y="190" width="8" height="10"/>
    <rect x="14" y="240" width="8" height="10"/>
    <rect x="34" y="240" width="8" height="10"/>
    <rect x="128" y="230" width="8" height="10"/>
    <rect x="146" y="230" width="8" height="10"/>
    <rect x="232" y="300" width="8" height="10"/>
  </g>
</svg>
